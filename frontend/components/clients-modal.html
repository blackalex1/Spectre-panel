<div id="clients-modal" class="modal" style="z-index: 1050;">
    <div class="glass-card modal-card large-card">
        <div class="modal-header">
            <h2><span data-i18n="clients_modal_title">Клиенты подключения</span> <span id="clients-modal-ib-remark"></span></h2>
            <button class="btn close-modal-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <div class="action-bar">
                <button class="btn primary-btn" id="add-client-btn"><i class="fa-solid fa-user-plus"></i> <span data-i18n="clients_add_btn">Добавить клиента</span></button>
            </div>
            <div class="table-container">
                <table class="glass-table">
                    <thead>
                        <tr>
                            <th data-i18n="clients_th_email">Email</th>
                            <th data-i18n="clients_th_status">Статус</th>
                            <th data-i18n="clients_th_used">Использовано</th>
                            <th data-i18n="clients_th_limit">Лимит</th>
                            <th data-i18n="clients_th_expiry">Срок действия</th>
                            <th data-i18n="clients_th_actions">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="clients-table-body">
                        <!-- Заполняется динамически -->
                    </tbody>
                </table>
            </div>
            
            <!-- Chart Container (hidden by default) -->
            <div id="client-traffic-chart-container" style="display: none; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0; font-size: 16px; color: var(--text-primary);" data-i18n="clients_traffic_chart_title">График потребления трафика за 30 дней</h3>
                    <button type="button" class="btn secondary-btn icon-btn" id="btn-close-traffic-chart" style="padding: 5px 10px;"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div style="position: relative; height: 220px; width: 100%;">
                    <canvas id="client-traffic-canvas"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
