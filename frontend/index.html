<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Diagnostic JS Error Logger -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            var errDiv = document.getElementById('diag-err-div');
            if (!errDiv) {
                errDiv = document.createElement('div');
                errDiv.id = 'diag-err-div';
                errDiv.style.position = 'fixed';
                errDiv.style.top = '0';
                errDiv.style.left = '0';
                errDiv.style.width = '100%';
                errDiv.style.background = '#dc2626';
                errDiv.style.color = '#ffffff';
                errDiv.style.zIndex = '99999';
                errDiv.style.padding = '12px';
                errDiv.style.fontSize = '13px';
                errDiv.style.fontWeight = '600';
                errDiv.style.fontFamily = 'monospace';
                errDiv.style.wordBreak = 'break-all';
                errDiv.style.boxShadow = '0 4px 6px -1px rgba(0,0,0,0.5)';
                document.documentElement.appendChild(errDiv);
            }
            errDiv.innerText = 'JS Error: ' + message + '\nFile: ' + source + ':' + lineno + ':' + colno;
            console.error('Diag Error:', message, source, lineno, colno, error);
        };
        window.onunhandledrejection = function(event) {
            var errDiv = document.getElementById('diag-rej-div');
            if (!errDiv) {
                errDiv = document.createElement('div');
                errDiv.id = 'diag-rej-div';
                errDiv.style.position = 'fixed';
                errDiv.style.top = '60px';
                errDiv.style.left = '0';
                errDiv.style.width = '100%';
                errDiv.style.background = '#ea580c';
                errDiv.style.color = '#ffffff';
                errDiv.style.zIndex = '99999';
                errDiv.style.padding = '12px';
                errDiv.style.fontSize = '13px';
                errDiv.style.fontWeight = '600';
                errDiv.style.fontFamily = 'monospace';
                errDiv.style.wordBreak = 'break-all';
                errDiv.style.boxShadow = '0 4px 6px -1px rgba(0,0,0,0.5)';
                document.documentElement.appendChild(errDiv);
            }
            errDiv.innerText = 'Promise Reject: ' + event.reason;
            console.error('Diag Promise Reject:', event.reason);
        };
    </script>
    <title>Spectre Panel</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <!-- Local Outfit Font -->
    <link rel="stylesheet" href="libs/outfit/outfit.css" media="print" onload="this.media='all'">
    <!-- Local FontAwesome Icons -->
    <link rel="stylesheet" href="libs/font-awesome/css/all.min.css" media="print" onload="this.media='all'">
    <!-- Local Chart.js -->
    <script src="libs/chart.js" defer></script>
    <!-- Local QRCode.js -->
    <script src="libs/qrcode.min.js" defer></script>
    <!-- Local Telegram WebApp SDK -->
    <script src="libs/telegram-web-app.js" defer></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body class="dark-theme">
    
    <!-- Спиннер загрузки / авторизации -->
    <div id="loading-overlay" class="overlay active">
        <div class="glass-card loading-card">
            <div class="spinner"></div>
            <h2 id="loading-text">Загрузка панели...</h2>
            <p id="loading-subtext">Пожалуйста, подождите</p>
        </div>
    </div>

    <!-- Окно логина (показывается только если секретный путь открыт в обычном браузере без сессии) -->
    <div id="login-overlay" class="overlay">
        <div class="glass-card login-card">
            <div class="brand">
                <i class="fa-solid fa-shield-halved brand-logo"></i>
                <h2 data-i18n="login_title">SPECTRE CONTROL PANEL</h2>
            </div>
            <form id="login-form">
                <!-- Credentials Section -->
                <div id="login-credentials-group">
                    <div class="input-group">
                        <label for="username" data-i18n="login_username">Имя пользователя</label>
                        <input type="text" id="username" placeholder="Введите логин" data-i18n-placeholder="login_username">
                    </div>
                    <div class="input-group" style="margin-top: 15px;">
                        <label for="password" data-i18n="login_password">Пароль</label>
                        <input type="password" id="password" placeholder="Введите пароль" data-i18n-placeholder="login_password">
                    </div>
                </div>

                <!-- 2FA Section (hidden initially) -->
                <div id="login-2fa-group" style="display: none;">
                    <div class="input-group" id="login-totp-group">
                        <label for="login-totp-code" data-i18n="login_2fa_label">Код двухфакторной аутентификации</label>
                        <input type="text" id="login-totp-code" maxlength="6" placeholder="000000" data-i18n-placeholder="login_2fa_placeholder" style="text-align: center; font-size: 20px; letter-spacing: 6px; font-weight: 600; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 8px; padding: 10px;">
                    </div>
                    <div id="login-tg-2fa-message" style="display: none; margin-top: 15px; font-size: 14px; color: var(--text-secondary); text-align: center;">
                        <i class="fa-solid fa-spinner fa-spin"></i> Подтвердите вход в Telegram-боте...
                    </div>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="button" id="btn-login-2fa-back" class="btn secondary-btn w-100" style="display: none; padding: 10px; font-weight: 600; border: 1px solid var(--border-color); color: var(--text-secondary);"><i class="fa-solid fa-arrow-left"></i> <span data-i18n="login_2fa_back">Назад</span></button>
                    <button type="submit" id="btn-login-submit" class="btn primary-btn w-100" style="padding: 10px; font-weight: 600;"><i class="fa-solid fa-right-to-bracket"></i> <span data-i18n="login_btn">Войти</span></button>
                </div>
            </form>
            <div id="login-error" class="error-msg"></div>
        </div>
    </div>

    <!-- Главная структура панели -->
    <div id="app-container" class="app-layout">
        
        <!-- Боковая панель навигации -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fa-solid fa-shield-halved logo"></i>
                <span>Spectre Panel</span>
            </div>
            
            <nav class="sidebar-menu">
                <button class="nav-item active" data-tab="dashboard">
                    <i class="fa-solid fa-chart-line"></i> <span data-i18n="nav_dashboard">Дашборд</span>
                </button>
                <button class="nav-item" data-tab="inbounds">
                    <i class="fa-solid fa-network-wired"></i> <span data-i18n="nav_inbounds">Подключения</span>
                </button>
                <button class="nav-item" data-tab="xray">
                    <i class="fa-solid fa-terminal"></i> <span data-i18n="nav_xray">Ядро Xray</span>
                </button>
                <button class="nav-item" data-tab="hysteria">
                    <i class="fa-solid fa-terminal"></i> <span data-i18n="nav_hysteria">Ядро Hysteria</span>
                </button>
                <button class="nav-item" data-tab="routing">
                    <i class="fa-solid fa-route"></i> <span data-i18n="nav_routing">Маршрутизация</span>
                </button>
                <button class="nav-item" data-tab="settings">
                    <i class="fa-solid fa-gears"></i> <span data-i18n="nav_settings">Настройки</span>
                </button>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fa-regular fa-circle-user"></i>
                    <span id="nav-username">Admin</span>
                </div>
                <button id="logout-btn" class="btn icon-btn" title="Выйти" data-i18n-title="nav_logout"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="content-area">
            
            <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
            <header class="top-bar">
                <div class="page-title">
                    <h1 id="current-tab-title">Панель управления</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 15px; margin-left: auto;">
                    <!-- Языковой селектор -->
                    <div class="lang-select-wrapper" style="position: relative; display: inline-block;">
                        <select id="lang-select" class="glass-select" style="background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; outline: none; transition: var(--transition-fast);">
                            <!-- Заполняется динамически -->
                        </select>
                    </div>
                    <div class="status-badge" id="xray-status-badge">
                        <span class="status-dot"></span>
                        <span class="status-text">Xray: Проверка...</span>
                    </div>
                    <div class="status-badge" id="hysteria-status-badge">
                        <span class="status-dot"></span>
                        <span class="status-text">Hysteria: Проверка...</span>
                    </div>
                </div>
            </header>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Custom App JS -->
    <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
