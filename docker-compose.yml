services:
  db:
    image: postgres:16-alpine
    container_name: vpn-db
    restart: always
    network_mode: host
    env_file:
      - ./config/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./config/init-roles.sh:/docker-entrypoint-initdb.d/init-roles.sh:ro

  vpn-panel:
    build: .
    container_name: vpn-panel
    restart: always
    network_mode: host
    depends_on:
      - db
    volumes:
      - ./config:/app/config
      - ./bin:/app/bin
      - /var/run/vpn_panel:/var/run/vpn_panel
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./config/.env

volumes:
  pgdata:
