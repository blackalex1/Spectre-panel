services:
  db:
    image: postgres:16-alpine
    container_name: vpn-db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - ./config/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./config/init-roles.sh:/docker-entrypoint-initdb.d/init-roles.sh:ro

  vpn-panel:
    build: .
    container_name: vpn-panel
    restart: always
    network_mode: host
    depends_on:
      - db
    volumes:
      - ./config:/app/config
      - ./bin:/app/bin
      - ./backups:/app/backups
      - /var/run/vpn_panel:/var/run/vpn_panel
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./config/.env
    # ulimits:
    #   nofile:
    #     soft: 1000000
    #     hard: 1000000

volumes:
  pgdata:
